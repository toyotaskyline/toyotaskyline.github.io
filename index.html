    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at center, #131130 0%, #030712 100%);
            touch-action: manipulation;
            overscroll-behavior: none;
        }
        .retro-font {
            font-family: 'Orbitron', sans-serif;
        }
        ::-webkit-scrollbar { display: none; }
        
        /* エフェクトアニメーション */
        @keyframes neon-pulse {
            0%, 100% { opacity: 0.3; text-shadow: 0 0 10px rgba(168, 85, 247, 0.5); }
            50% { opacity: 0.8; text-shadow: 0 0 20px rgba(168, 85, 247, 0.9); }
        }
        .neon-glow { animation: neon-pulse 2s infinite; }
        
        @keyframes super-burst {
            0% { transform: scale(0) rotate(-20deg); opacity: 0; filter: brightness(2); }
            40% { transform: scale(1.4) rotate(10deg); opacity: 1; filter: brightness(1.5); }
            70% { transform: scale(0.9) rotate(-5deg); filter: brightness(1); }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        .animate-burst {
            animation: super-burst 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        
        .text-rainbow {
            background: linear-gradient(to right, #ff3366, #ff9933, #ffff33, #33ff33, #33ffff, #9933ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: rainbow-shift 3s linear infinite;
            background-size: 200% auto;
        }
        @keyframes rainbow-shift {
            to { background-position: 200% center; }
        }
    </style>
</head>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { 
            getAuth, 
            signInAnonymously, 
            signInWithPopup, 
            GoogleAuthProvider, 
            signOut, 
            onAuthStateChanged 
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { 
            getFirestore, 
            doc, 
            setDoc, 
            updateDoc, 
            onSnapshot, 
            getDoc, 
            collection 
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- Firebase Config (User's project) ---
        const firebaseConfig = {
            apiKey: "AIzaSyBkMtffenQmKomClPWZa9fD-WKYrhQpoiw",
            authDomain: "puyopuyo-7ea9c.firebaseapp.com",
            projectId: "puyopuyo-7ea9c",
            storageBucket: "puyopuyo-7ea9c.firebasestorage.app",
            messagingSenderId: "627527369771",
            appId: "1:627527369771:web:8803982027fc39d34d166e",
            measurementId: "G-93ZTVJ7V8D"
        };
        const appId = 'puyo-fall-multiplayer';
        
        let db = null;
        let auth = null;
        let userId = null;
        let userProfile = { displayName: "ゲスト", highScore: 0 };
        let matchRef = null;
        let matchUnsubscribe = null;
        let isPlayer1 = true;
        let isSoloMode = true;

        /* --- SOUND SYNTHESIS --- */
        class SoundManager {
            constructor() {
                this.ctx = null;
                this.muted = false;
            }
            init() {
                if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            }
            playPop(pitchModifier = 1) {
                if (this.muted) return;
                this.init();
                const now = this.ctx.currentTime;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(220 * pitchModifier, now);
                osc.frequency.exponentialRampToValueAtTime(880 * pitchModifier, now + 0.12);
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start(now);
                osc.stop(now + 0.16);
            }
            playRotate() {
                if (this.muted) return;
                this.init();
                const now = this.ctx.currentTime;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(350, now);
                osc.frequency.linearRampToValueAtTime(450, now + 0.08);
                gain.gain.setValueAtTime(0.08, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.09);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start(now);
                osc.stop(now + 0.1);
            }
            playMove() {
                if (this.muted) return;
                this.init();
                const now = this.ctx.currentTime;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(150, now);
                gain.gain.setValueAtTime(0.05, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start(now);
                osc.stop(now + 0.06);
            }
            playChain(count) {
                if (this.muted) return;
                this.init();
                const now = this.ctx.currentTime;
                const baseFreqs = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88, 523.25, 587.33, 659.25, 783.99, 880.00];
                const rootIdx = Math.min(count - 1, baseFreqs.length - 1);
                const rootFreq = baseFreqs[rootIdx];
                
                const playSynth = (freq, type, timeStart, timeEnd, vol) => {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, timeStart);
                    gain.gain.setValueAtTime(vol, timeStart);
                    gain.gain.exponentialRampToValueAtTime(0.01, timeEnd);
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    osc.start(timeStart);
                    osc.stop(timeEnd);
                };

                playSynth(rootFreq, 'square', now, now + 0.5, 0.12);
                playSynth(rootFreq * 1.25, 'triangle', now + 0.05, now + 0.55, 0.12);
                playSynth(rootFreq * 1.5, 'sine', now + 0.1, now + 0.6, 0.12);

                if (count >= 3) {
                    playSynth(rootFreq / 2, 'sawtooth', now, now + 0.6, 0.15);
                }
            }
            playGameOver() {
                if (this.muted) return;
                this.init();
                const now = this.ctx.currentTime;
                const notes = [300, 240, 180, 120];
                notes.forEach((freq, idx) => {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(freq, now + idx * 0.15);
                    gain.gain.setValueAtTime(0.1, now + idx * 0.15);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + idx * 0.15 + 0.2);
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    osc.start(now + idx * 0.15);
                    osc.stop(now + idx * 0.15 + 0.22);
                });
            }
        }
        const sound = new SoundManager();

        // Sound listener
        document.getElementById('sound-toggle').addEventListener('click', () => {
            sound.muted = !sound.muted;
            const icon = document.getElementById('sound-icon');
            if (sound.muted) {
                icon.className = 'fas fa-volume-mute text-red-400';
            } else {
                icon.className = 'fas fa-volume-up text-purple-400';
                sound.playPop();
            }
        });

        /* --- Toast System --- */
        function showToast(message) {
            const toast = document.getElementById('toast-notification');
            toast.textContent = message;
            toast.style.opacity = '1';
            setTimeout(() => {
                toast.style.opacity = '0';
            }, 3000);
        }

        // --- GAME ENGINE CONSTANTS ---
        const COLS = 6;
        const ROWS = 12;
        const COLORS = {
            1: { fill: '#ef4444', shadow: '#b91c1c' }, // Red
            2: { fill: '#3b82f6', shadow: '#1d4ed8' }, // Blue
            3: { fill: '#10b981', shadow: '#047857' }, // Green
            4: { fill: '#f59e0b', shadow: '#b45309' }, // Yellow
            5: { fill: '#8b5cf6', shadow: '#6d28d9' }, // Purple
            6: { fill: '#9ca3af', shadow: '#4b5563' }  // Garbage (Gray)
        };

        const STATE_WAITING = 'waiting';
        const STATE_COUNTDOWN = 'countdown';
        const STATE_CONTROL = 'control';
        const STATE_FALLING = 'falling';
        const STATE_POPPING = 'popping';
        const STATE_GAMEOVER = 'gameover';

        class MultiplayerGame {
            constructor() {
                this.canvas = document.getElementById('game-canvas');
                this.ctx = this.canvas.getContext('2d');
                this.nextCanvas = document.getElementById('next-canvas');
                this.nextCtx = this.nextCanvas.getContext('2d');
                
                this.oppCanvas = document.getElementById('opponent-canvas');
                this.oppCtx = this.oppCanvas.getContext('2d');
                
                this.grid = this.createEmptyGrid();
                this.oppGrid = this.createEmptyGrid();
                
                this.activePair = { p1: {x:2, y:0, c:1}, p2: {x:2, y:-1, c:2}, rot: 0 };
                this.nextPair = { c1: 1, c2: 2 };
                
                this.score = 0;
                this.chain = 0;
                this.gameState = STATE_WAITING;
                
                this.dropInterval = 1000;
                this.lastDropTime = 0;
                this.isFastDropping = false;
                
                // Visual effects
                this.particles = [];
                this.popTargets = [];
                this.popTimer = 0;
                this.shakeAmount = 0;
                this.flashAlpha = 0;
                this.eyeLookDir = { x: 0, y: 0 };
                this.lastEyeMove = 0;
                this.isHandlingHardDrop = false;
                
                this.resizeCanvas();
                window.addEventListener('resize', () => this.resizeCanvas());
            }

            createEmptyGrid() {
                return Array(ROWS).fill(null).map(() => Array(COLS).fill(0));
            }

            resizeCanvas() {
                const height = Math.min(window.innerHeight * 0.45, 380);
                this.canvas.height = height;
                this.canvas.width = height * (COLS / ROWS);
                
                const oppHeight = Math.min(window.innerHeight * 0.35, 300);
                this.oppCanvas.height = oppHeight;
                this.oppCanvas.width = oppHeight * (COLS / ROWS);
            }

            generateNext() {
                const rand = () => Math.floor(Math.random() * 5) + 1;
                this.nextPair = { c1: rand(), c2: rand() };
                this.drawNext();
            }

            spawnPair() {
                if (this.grid[0][2] !== 0 || this.grid[1][2] !== 0) {
                    this.endGame(false);
                    return;
                }
                this.activePair = {
                    p1: { x: 2, y: 0, c: this.nextPair.c1 },
                    p2: { x: 2, y: -1, c: this.nextPair.c2 },
                    rot: 0
                };
                this.generateNext();
                this.gameState = STATE_CONTROL;
                this.lastDropTime = performance.now();
                this.syncState();
            }

            canMoveTo(x1, y1, x2, y2) {
                const check = (x, y) => (y < 0 ? x >= 0 && x < COLS : x >= 0 && x < COLS && y < ROWS && this.grid[y][x] === 0);
                return check(x1, y1) && check(x2, y2);
            }

            move(dx) {
                if (this.gameState !== STATE_CONTROL) return;
                const { p1, p2 } = this.activePair;
                if (this.canMoveTo(p1.x + dx, p1.y, p2.x + dx, p2.y)) {
                    p1.x += dx; p2.x += dx;
                    sound.playMove();
                }
            }

            rotate(dir) {
                if (this.gameState !== STATE_CONTROL) return;
                const nextRot = (this.activePair.rot + dir + 4) % 4;
                const offsets = [ {x:0, y:-1}, {x:1, y:0}, {x:0, y:1}, {x:-1, y:0} ]; // N, E, S, W
                const off = offsets[nextRot];
                
                let tx = this.activePair.p1.x + off.x;
                let ty = this.activePair.p1.y + off.y;
                let nx = this.activePair.p1.x;
                let ny = this.activePair.p1.y;

                // Wall kick
                if (tx < 0) { nx++; tx++; }
                else if (tx >= COLS) { nx--; tx--; }
                if (ty >= ROWS) { ny--; ty--; }

                if (this.canMoveTo(nx, ny, tx, ty)) {
                    this.activePair.p1.x = nx; this.activePair.p1.y = ny;
                    this.activePair.p2.x = tx; this.activePair.p2.y = ty;
                    this.activePair.rot = nextRot;
                    sound.playRotate();
                }
            }

            hardDrop() {
                if (this.gameState !== STATE_CONTROL || this.isHandlingHardDrop) return;
                this.isHandlingHardDrop = true;
                while (this.canMoveTo(this.activePair.p1.x, this.activePair.p1.y + 1, this.activePair.p2.x, this.activePair.p2.y + 1)) {
                    this.activePair.p1.y++; this.activePair.p2.y++;
                    this.score += 2;
                }
                this.lockPair();
                this.isHandlingHardDrop = false;
            }

            lockPair() {
                const { p1, p2 } = this.activePair;
                if (p1.y >= 0) this.grid[p1.y][p1.x] = p1.c;
                if (p2.y >= 0) this.grid[p2.y][p2.x] = p2.c;
                
                sound.playPop(0.7);
                this.gameState = STATE_FALLING;
                this.chain = 0;
                this.resolveGravity();
            }

            resolveGravity() {
                let moved = false;
                for (let r = ROWS - 2; r >= 0; r--) {
                    for (let c = 0; c < COLS; c++) {
                        if (this.grid[r][c] !== 0 && this.grid[r+1][c] === 0) {
                            let currR = r;
                            while (currR + 1 < ROWS && this.grid[currR+1][c] === 0) {
                                this.grid[currR+1][c] = this.grid[currR][c];
                                this.grid[currR][c] = 0;
                                currR++;
                                moved = true;
                            }
                        }
                    }
                }
                if (moved) {
                    setTimeout(() => this.resolveGravity(), 120);
                } else {
                    this.checkMatches();
                }
            }

            checkMatches() {
                const visited = Array(ROWS).fill(null).map(() => Array(COLS).fill(false));
                const toPop = [];

                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        const color = this.grid[r][c];
                        if (color > 0 && color < 6 && !visited[r][c]) {
                            const group = [];
                            const queue = [{r, c}];
                            visited[r][c] = true;

                            while (queue.length > 0) {
                                const curr = queue.shift();
                                group.push(curr);
                                const neighbors = [ {r: curr.r-1, c: curr.c}, {r: curr.r+1, c: curr.c}, {r: curr.r, c: curr.c-1}, {r: curr.r, c: curr.c+1} ];
                                for (const n of neighbors) {
                                    if (n.r >= 0 && n.r < ROWS && n.c >= 0 && n.c < COLS) {
                                        if (!visited[n.r][n.c] && this.grid[n.r][n.c] === color) {
                                            visited[n.r][n.c] = true;
                                            queue.push(n);
                                        }
                                    }
                                }
                            }
                            if (group.length >= 4) toPop.push(...group);
                        }
                    }
                }

                if (toPop.length > 0) {
                    this.chain++;
                    this.popTargets = toPop;
                    this.gameState = STATE_POPPING;
                    this.popTimer = 0;
                    
                    const pts = toPop.length * 10 + Math.pow(this.chain, 2.5) * 8;
                    this.score += Math.floor(pts);
                    
                    document.getElementById('score').textContent = this.score;
                    document.getElementById('mobile-score').textContent = this.score;
                    document.getElementById('chain-count').textContent = this.chain;
                    
                    sound.playChain(this.chain);
                    this.showBanner(this.chain);
                    
                    // Shake and light flashes
                    this.shakeAmount = Math.min(this.chain * 4, 20);
                    this.flashAlpha = Math.min(this.chain * 0.15, 0.8);
                    
                    toPop.forEach(cell => this.createParticles(cell.c, cell.r, this.grid[cell.r][cell.c]));
                    this.syncState();
                } else {
                    this.spawnPair();
                }
            }

            createParticles(gridX, gridY, colorId) {
                const cellW = this.canvas.width / COLS;
                const cellH = this.canvas.height / ROWS;
                const px = gridX * cellW + cellW/2;
                const py = gridY * cellH + cellH/2;
                const fill = COLORS[colorId]?.fill || '#fff';

                for (let i = 0; i < 8; i++) {
                    const a = Math.random() * Math.PI * 2;
                    const s = 3 + Math.random() * 6;
                    this.particles.push({
                        x: px, y: py, vx: Math.cos(a)*s, vy: Math.sin(a)*s,
                        radius: 3 + Math.random()*4, alpha: 1, color: fill, decay: 0.02 + Math.random()*0.02, type: 'circle'
                    });
                }
                const starCount = Math.min(4 + this.chain * 2, 12);
                for (let i = 0; i < starCount; i++) {
                    const a = Math.random() * Math.PI * 2;
                    const s = 4 + Math.random() * 8;
                    this.particles.push({
                        x: px, y: py, vx: Math.cos(a)*s, vy: Math.sin(a)*s,
                        radius: 5 + Math.random()*6, alpha: 1, color: '#ffffff', decay: 0.02 + Math.random()*0.03,
                        type: 'star', rot: Math.random()*Math.PI, rotSpeed: (Math.random()-0.5)*0.4
                    });
                }
            }

            showBanner(chains) {
                const banner = document.getElementById('chain-banner');
                const num = document.getElementById('chain-banner-num');
                const sub = document.getElementById('chain-banner-sub');

                num.textContent = `${chains} CHAIN!`;
                if (chains >= 5) {
                    num.className = "text-5xl font-black retro-font stroke-black drop-shadow-[0_4px_12px_rgba(255,255,255,0.8)] text-rainbow";
                    sub.textContent = "GODLIKE UNLEASHED!!!";
                    sub.className = "text-xl font-black uppercase tracking-widest text-white drop-shadow-[0_0_10px_rgba(255,0,0,1)]";
                } else if (chains >= 3) {
                    num.className = "text-4xl font-black text-red-400 retro-font stroke-black drop-shadow-[0_4px_10px_rgba(255,0,0,0.8)]";
                    sub.textContent = "Awesome Combo!";
                    sub.className = "text-base font-bold text-yellow-300 uppercase tracking-widest drop-shadow";
                } else {
                    num.className = "text-3xl font-black text-yellow-300 retro-font stroke-black drop-shadow-[0_4px_8px_rgba(0,0,0,0.8)]";
                    sub.textContent = chains === 1 ? "Pop!" : "Nice!";
                    sub.className = "text-sm font-bold text-pink-400 uppercase tracking-widest drop-shadow";
                }

                banner.classList.remove('hidden', 'scale-0', 'opacity-0', 'animate-burst');
                void banner.offsetWidth; // force reflow
                banner.classList.add('animate-burst');
                
                if(this.bannerTimer) clearTimeout(this.bannerTimer);
                this.bannerTimer = setTimeout(() => {
                    banner.classList.remove('animate-burst');
                    banner.classList.add('scale-0', 'opacity-0');
                }, 1500);
            }

            syncState() {
                if (isSoloMode || !matchRef || this.gameState === STATE_GAMEOVER) return;
                const updateData = {};
                if (isPlayer1) {
                    updateData.p1Grid = JSON.stringify(this.grid);
                    updateData.p1Score = this.score;
                } else {
                    updateData.p2Grid = JSON.stringify(this.grid);
                    updateData.p2Score = this.score;
                }
                updateDoc(matchRef, updateData).catch(e => console.debug(e));
            }

            async saveHighScore() {
                if (this.score > userProfile.highScore) {
                    userProfile.highScore = this.score;
                    document.getElementById('top-high-score').textContent = this.score;
                    
                    if (db && userId) {
                        try {
                            const userDocRef = doc(db, 'artifacts', appId, 'users', userId, 'profile', 'data');
                            await setDoc(userDocRef, {
                                displayName: userProfile.displayName,
                                highScore: this.score
                            }, { merge: true });
                            showToast("最高得点を更新＆クラウドに保存しました！");
                        } catch (e) {
                            console.error("Failed to save score:", e);
                        }
                    }
                }
            }

            endGame(isWinner) {
                this.gameState = STATE_GAMEOVER;
                
                if (!isSoloMode && !isWinner && matchRef) {
                    updateDoc(matchRef, { status: isPlayer1 ? 'gameover_p1' : 'gameover_p2' }).catch(()=>{});
                }
                
                sound.playGameOver();
                this.saveHighScore();
                
                const title = isWinner ? "YOU WIN!" : "GAME OVER";
                const titleClass = isWinner ? "text-yellow-400" : "text-red-500";
                
                document.getElementById('overlay-message').classList.remove('hidden');
                document.getElementById('overlay-title').textContent = title;
                document.getElementById('overlay-title').className = `text-5xl font-black ${titleClass} retro-font tracking-wider mb-4 drop-shadow-lg text-center`;
                document.getElementById('overlay-desc').innerHTML = `スコア: <span class="text-yellow-300 font-bold">${this.score}</span><br>最高連鎖: <span class="text-pink-400 font-bold">${this.chain}連鎖</span>`;
                document.getElementById('restart-btn').classList.remove('hidden');
            }

            quitGame() {
                // Remove listeners
                if (matchUnsubscribe) {
                    matchUnsubscribe();
                    matchUnsubscribe = null;
                }
                
                this.gameState = STATE_GAMEOVER;
                matchRef = null;
                
                // Reset views
                document.getElementById('overlay-message').classList.add('hidden');
                document.getElementById('screen-top').classList.remove('hidden');
                document.getElementById('opponent-container').classList.add('hidden');
                document.getElementById('connection-status').textContent = "DISCONNECTED";
                document.getElementById('connection-status').className = "text-[10px] text-gray-500 font-bold uppercase";
            }

            updateAndDraw(now) {
                if (this.gameState === STATE_WAITING) return;

                if (now - this.lastEyeMove > 1800) {
                    this.eyeLookDir = { x: (Math.random()-0.5)*5, y: (Math.random()-0.5)*5 };
                    this.lastEyeMove = now;
                }

                // Game Logic Update
                if (this.gameState === STATE_CONTROL) {
                    const activeInterval = this.isFastDropping ? 60 : this.dropInterval;
                    if (now - this.lastDropTime >= activeInterval) {
                        if (this.canMoveTo(this.activePair.p1.x, this.activePair.p1.y+1, this.activePair.p2.x, this.activePair.p2.y+1)) {
                            this.activePair.p1.y++; this.activePair.p2.y++;
                        } else {
                            this.lockPair();
                        }
                        this.lastDropTime = now;
                    }
                } else if (this.gameState === STATE_POPPING) {
                    this.popTimer += 0.05;
                    if (this.popTimer >= 1.0) {
                        this.popTargets.forEach(cell => this.grid[cell.r][cell.c] = 0);
                        this.popTargets = [];
                        this.gameState = STATE_FALLING;
                        this.resolveGravity();
                    }
                }

                // Particle Update
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    let p = this.particles[i];
                    p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.alpha -= p.decay;
                    if (p.alpha <= 0) this.particles.splice(i, 1);
                }

                // Draw Game Board
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                
                this.ctx.save();
                if (this.shakeAmount > 0) {
                    this.ctx.translate((Math.random()-0.5)*this.shakeAmount, (Math.random()-0.5)*this.shakeAmount);
                    this.shakeAmount *= 0.85;
                    if(this.shakeAmount < 0.5) this.shakeAmount = 0;
                }

                this.drawGrid(this.ctx, this.canvas, this.grid, this.popTargets, this.popTimer);
                if (this.gameState === STATE_CONTROL) this.drawActive(this.ctx, this.canvas);
                this.drawParticles(this.ctx);
                this.ctx.restore();

                // Flash Screen on pop
                if (this.flashAlpha > 0) {
                    this.ctx.fillStyle = `rgba(255, 255, 255, ${this.flashAlpha})`;
                    this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                    this.flashAlpha -= 0.05;
                }

                // Draw Opponent if active
                if (!isSoloMode) {
                    this.oppCtx.clearRect(0, 0, this.oppCanvas.width, this.oppCanvas.height);
                    this.drawGrid(this.oppCtx, this.oppCanvas, this.oppGrid, [], 0, true);
                }
            }

            drawGrid(ctx, cvs, gridData, popList, pTimer, isOpponent = false) {
                const cW = cvs.width / COLS;
                const cH = cvs.height / ROWS;
                const radius = Math.min(cW, cH) * 0.46;

                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        const colId = gridData[r][c];
                        if (colId !== 0) {
                            const isPopping = popList.some(p => p.r === r && p.c === c);
                            const cx = c * cW + cW/2;
                            const cy = r * cH + cH/2;
                            
                            if (isPopping) {
                                ctx.save();
                                ctx.globalAlpha = 1 - pTimer;
                                this.drawNode(ctx, cx, cy, radius * (1 + pTimer*0.5), colId, false, isOpponent);
                                ctx.restore();
                            } else {
                                const colorConf = COLORS[colId];
                                if (colorConf && colId !== 6) { 
                                    const check = (dr, dc) => (r+dr>=0 && r+dr<ROWS && c+dc>=0 && c+dc<COLS && gridData[r+dr][c+dc] === colId);
                                    ctx.fillStyle = colorConf.fill;
                                    ctx.beginPath();
                                    const bw = radius * 0.8;
                                    if (check(-1, 0)) ctx.fillRect(cx - bw/2, cy - cH/2, bw, cH/2); // N
                                    if (check(1, 0)) ctx.fillRect(cx - bw/2, cy, bw, cH/2); // S
                                    if (check(0, 1)) ctx.fillRect(cx, cy - bw/2, cW/2, bw); // E
                                    if (check(0, -1)) ctx.fillRect(cx - cW/2, cy - bw/2, cW/2, bw); // W
                                }
                                this.drawNode(ctx, cx, cy, radius, colId, false, isOpponent);
                            }
                        }
                    }
                }
            }

            drawActive(ctx, cvs) {
                const cW = cvs.width / COLS;
                const cH = cvs.height / ROWS;
                const radius = Math.min(cW, cH) * 0.46;
                
                // Ghost preview
                let dy1 = this.activePair.p1.y, dy2 = this.activePair.p2.y;
                while (this.canMoveTo(this.activePair.p1.x, dy1+1, this.activePair.p2.x, dy2+1)) { dy1++; dy2++; }
                
                ctx.save();
                ctx.globalAlpha = 0.25;
                ctx.lineWidth = 2;
                ctx.setLineDash([3, 3]);
                const drawG = (x, y, c) => {
                    if(y >= 0) {
                        ctx.strokeStyle = COLORS[c].fill;
                        ctx.beginPath(); ctx.arc(x*cW+cW/2, y*cH+cH/2, radius-2, 0, Math.PI*2); ctx.stroke();
                    }
                };
                drawG(this.activePair.p1.x, dy1, this.activePair.p1.c);
                drawG(this.activePair.p2.x, dy2, this.activePair.p2.c);
                ctx.restore();

                // Active nodes
                const drawA = (p) => {
                    if(p.y >= 0) this.drawNode(ctx, p.x*cW+cW/2, p.y*cH+cH/2, radius, p.c, true);
                };
                drawA(this.activePair.p1); drawA(this.activePair.p2);
            }

            drawNode(ctx, cx, cy, radius, colId, isActive, isOpponent = false) {
                const conf = COLORS[colId];
                if (!conf) return;
                ctx.save();
                ctx.translate(cx, cy);
                
                let scale = 1;
                if (!isActive && !isOpponent) scale = 1 + Math.sin(performance.now()*0.003 + cx*cy)*0.02;
                ctx.scale(scale, scale);

                ctx.beginPath();
                ctx.arc(0, 0, radius, 0, Math.PI*2);
                
                const grad = ctx.createRadialGradient(-radius*0.3, -radius*0.3, radius*0.1, 0, 0, radius);
                grad.addColorStop(0, '#fff');
                grad.addColorStop(0.2, conf.fill);
                grad.addColorStop(1, conf.shadow);
                ctx.fillStyle = grad;
                ctx.fill();
                
                ctx.strokeStyle = 'rgba(0,0,0,0.2)';
                ctx.lineWidth = 1.5;
                ctx.stroke();

                // Cute eyes (Skip on plain gray Garbage blocks)
                if (colId !== 6) {
                    const eOff = radius * 0.35, eRad = radius * 0.22, pRad = radius * 0.11;
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(-eOff, -radius*0.1, eRad, 0, Math.PI*2);
                    ctx.arc(eOff, -radius*0.1, eRad, 0, Math.PI*2);
                    ctx.fill();
                    
                    const lx = isOpponent ? 0 : this.eyeLookDir.x * 0.3;
                    const ly = isOpponent ? 0 : this.eyeLookDir.y * 0.3;
                    
                    ctx.fillStyle = '#0f172a';
                    ctx.beginPath();
                    ctx.arc(-eOff+lx, -radius*0.1+ly, pRad, 0, Math.PI*2);
                    ctx.arc(eOff+lx, -radius*0.1+ly, pRad, 0, Math.PI*2);
                    ctx.fill();
                    
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(-eOff+lx-1, -radius*0.1+ly-1, 1.5, 0, Math.PI*2);
                    ctx.arc(eOff+lx-1, -radius*0.1+ly-1, 1.5, 0, Math.PI*2);
                    ctx.fill();
                }
                ctx.restore();
            }

            drawParticles(ctx) {
                this.particles.forEach(p => {
                    ctx.save();
                    ctx.globalAlpha = p.alpha;
                    ctx.fillStyle = p.color;
                    if (p.type === 'star') {
                        ctx.translate(p.x, p.y); ctx.rotate(p.rot); p.rot += p.rotSpeed;
                        ctx.beginPath();
                        for (let i = 0; i < 8; i++) {
                            const rad = i%2===0 ? p.radius : p.radius*0.3;
                            const a = (i*Math.PI)/4;
                            if(i===0) ctx.moveTo(Math.cos(a)*rad, Math.sin(a)*rad);
                            else ctx.lineTo(Math.cos(a)*rad, Math.sin(a)*rad);
                        }
                        ctx.fill();
                    } else {
                        ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2); ctx.fill();
                    }
                    ctx.restore();
                });
            }

            drawNext() {
                // Desktop preview
                this.nextCtx.clearRect(0, 0, this.nextCanvas.width, this.nextCanvas.height);
                let w = this.nextCanvas.width, h = this.nextCanvas.height, r = Math.min(w,h)*0.2;
                this.drawNode(this.nextCtx, w/2, h*0.3, r, this.nextPair.c2, false, true);
                this.drawNode(this.nextCtx, w/2, h*0.7, r, this.nextPair.c1, false, true);

                // Mobile preview
                const mobileNextCanvas = document.getElementById('next-canvas-mobile');
                const mCtx = mobileNextCanvas.getContext('2d');
                mCtx.clearRect(0, 0, mobileNextCanvas.width, mobileNextCanvas.height);
                let mw = mobileNextCanvas.width, mh = mobileNextCanvas.height, mr = Math.min(mw,mh)*0.22;
                this.drawNode(mCtx, mw/2, mh*0.3, mr, this.nextPair.c2, false, true);
                this.drawNode(mCtx, mw/2, mh*0.7, mr, this.nextPair.c1, false, true);
            }
        }

        // --- GAME INSTANCE ---
        let game = new MultiplayerGame();

                        document.getElementById('auth-logged').classList.remove('hidden');
                        
                        // Load Profiling details
                        const userDocRef = doc(db, 'artifacts', appId, 'users', userId, 'profile', 'data');

                        if (docSnap.exists()) {
                            userProfile = docSnap.data();

                            userProfile = {
                                displayName: user.displayName || `Puyo-${Math.floor(Math.random()*9000+1000)}`,
                                highScore: 0
                            };
                            await setDoc(userDocRef, userProfile);
                        }
                        
                        document.getElementById('top-username').textContent = userProfile.displayName;
                        document.getElementById('input-username').value = userProfile.displayName;
                        document.getElementById('top-high-score').textContent = userProfile.highScore;

            }
        });

        // Anonymous login fallback
        document.getElementById('btn-guest-login').addEventListener('click', async () => {
            if (!auth) return;
            try {
                await signInAnonymously(auth);
                showToast("ゲストとしてログインしました。");
            } catch (err) {
                console.error("Guest Auth error:", err);
                showToast("ログインに失敗しました。");
            }
        });

        // Logout
        document.getElementById('btn-logout').addEventListener('click', async () => {
            if (!auth) return;
            try {
                await signOut(auth);
                showToast("ログアウトしました。");
            } catch (err) {
                console.error("Logout error:", err);
            }
        });

        // Update profile username
        document.getElementById('btn-update-name').addEventListener('click', async () => {
            const newName = document.getElementById('input-username').value.trim();
            if (!newName) return;
            userProfile.displayName = newName;
            document.getElementById('top-username').textContent = newName;
            document.getElementById('player-label-name').textContent = newName.toUpperCase();
            
            if (db && userId) {
                const userDocRef = doc(db, 'artifacts', appId, 'users', userId, 'profile', 'data');
                await setDoc(userDocRef, { displayName: newName }, { merge: true });
                showToast("ユーザー名を変更しました！");
            }
        });

        // Mode: Solo Play
        document.getElementById('btn-mode-solo').addEventListener('click', () => {
            isSoloMode = true;
            document.getElementById('screen-top').classList.add('hidden');
            document.getElementById('opponent-container').classList.add('hidden');
            document.getElementById('connection-status').textContent = "SOLO GAME";
            document.getElementById('connection-status').className = "text-[10px] text-blue-400 font-bold uppercase";
            
            startCountdown();
        });

        // Mode: Online Play (Matchmaking Queue)
        document.getElementById('btn-mode-multi').addEventListener('click', () => {
            if (!db || !userId) {
                showToast("対戦をするには、先にログインするかゲストを選択してください。");
                return;
            }
            isSoloMode = false;
            document.getElementById('screen-top').classList.add('hidden');
            document.getElementById('opponent-container').classList.remove('hidden');
            document.getElementById('opponent-status').classList.remove('hidden');
            document.getElementById('opponent-status-text').innerHTML = "MATCHMAKING...<br>対戦相手を探しています";
            document.getElementById('connection-status').textContent = "FINDING OPPONENT...";
            document.getElementById('connection-status').className = "text-[10px] text-yellow-500 font-bold uppercase animate-pulse";
            
            initiateMatchmaking();
        });

        // In-game Exit handler
        document.getElementById('btn-back-to-menu').addEventListener('click', () => {
            game.quitGame();
        });

        // Matchmaking Queue loop
        async function initiateMatchmaking() {
            const lobbyDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'matchmaking', 'lobby');
            try {
                const lobbySnap = await getDoc(lobbyDocRef);
                
                if (lobbySnap.exists() && lobbySnap.data().waitingUser && lobbySnap.data().waitingUser !== userId) {
                    // Match found! Join as Player 2
                    isPlayer1 = false;
                    const p1Id = lobbySnap.data().waitingUser;
                    const p1Name = lobbySnap.data().waitingUserName || "対戦相手";
                    
                    document.getElementById('opponent-label-name').textContent = p1Name.toUpperCase();
                    
                    matchRef = doc(db, 'artifacts', appId, 'public', 'data', 'matches', `MATCH_${p1Id}`);
                    await setDoc(matchRef, {
                        p1Id: p1Id,
                        p1Name: p1Name,
                        p2Id: userId,
                        p2Name: userProfile.displayName,
                        p1Grid: JSON.stringify(game.createEmptyGrid()),
                        p2Grid: JSON.stringify(game.createEmptyGrid()),
                        p1Score: 0,
                        p2Score: 0,
                        status: 'playing'
                    });
                    
                    // Clear lobby
                    await setDoc(lobbyDocRef, { waitingUser: null, waitingUserName: null });
                    startCountdown();
                    listenToMatch();
                } else {
                    // Host match: Join as Player 1 and wait
                    isPlayer1 = true;
                    matchRef = doc(db, 'artifacts', appId, 'public', 'data', 'matches', `MATCH_${userId}`);
                    await setDoc(lobbyDocRef, { 
                        waitingUser: userId, 
                        waitingUserName: userProfile.displayName 
                    });
                    await setDoc(matchRef, {
                        p1Id: userId,
                        p1Name: userProfile.displayName,
                        p2Id: null,
                        p2Name: "",
                        p1Grid: JSON.stringify(game.grid),
                        p2Grid: JSON.stringify(game.oppGrid),
                        p1Score: 0,
                        p2Score: 0,
                        status: 'waiting'
                    });
                    
                    listenToMatch();
                }
            } catch (err) {
                console.error(err);
                showToast("マッチングサーバーにエラーが発生しました。");
                game.quitGame();
            }
        }

        // Live listening to active Match
        function listenToMatch() {
            if (matchUnsubscribe) matchUnsubscribe();
            
            matchUnsubscribe = onSnapshot(matchRef, (docSnap) => {
                if (!docSnap.exists() || game.gameState === STATE_GAMEOVER) return;
                const data = docSnap.data();
                
                // Match start trigger
                if (isPlayer1 && data.p2Id && game.gameState === STATE_WAITING) {
                    document.getElementById('opponent-label-name').textContent = data.p2Name.toUpperCase();
                    startCountdown();
                }

                // In-game opponent update syncing
                if (game.gameState !== STATE_WAITING && game.gameState !== STATE_COUNTDOWN) {
                    try {
                        if (isPlayer1) {
                            game.oppGrid = JSON.parse(data.p2Grid);
                            document.getElementById('opponent-score').textContent = data.p2Score;
                        } else {
                            game.oppGrid = JSON.parse(data.p1Grid);
                            document.getElementById('opponent-score').textContent = data.p1Score;
                        }
                    } catch(e) {}
                    
                    // Live Game Over conditions
                    if (data.status === 'gameover_p1' && !isPlayer1) game.endGame(true);
                    if (data.status === 'gameover_p2' && isPlayer1) game.endGame(true);
                }
            }, (error) => {
                console.error("Match updates listen failed:", error);
            });
        }

        // Standard Match/Solo starts countdown
        function startCountdown() {
            game.gameState = STATE_COUNTDOWN;
            document.getElementById('opponent-status').classList.add('hidden');
            
            if (!isSoloMode) {
                document.getElementById('connection-status').textContent = "ONLINE MATCH";
                document.getElementById('connection-status').className = "text-[10px] text-green-400 font-bold uppercase";
            } else {
                document.getElementById('connection-status').textContent = "SOLO MATCH";
                document.getElementById('connection-status').className = "text-[10px] text-blue-400 font-bold uppercase";
            }
            
            const overlay = document.getElementById('overlay-message');
            const title = document.getElementById('overlay-title');
            const desc = document.getElementById('overlay-desc');
            document.getElementById('restart-btn').classList.add('hidden');
            
            overlay.classList.remove('hidden');
            title.className = "text-5xl font-black text-yellow-400 retro-font tracking-wider mb-2 text-center drop-shadow-lg animate-pulse";
            title.textContent = "READY?";
            desc.innerHTML = isSoloMode ? "ぷよを決まった色で4個つなげよう！" : "対戦相手が見つかりました！";
            
            let count = 3;
            const interval = setInterval(() => {
                if (count > 0) {
                    title.textContent = count;
                    sound.playPop(1.2 + (3 - count) * 0.2);
                    count--;
                } else {
                    clearInterval(interval);
                    title.className = "text-6xl font-black text-red-500 retro-font tracking-wider mb-2 text-center drop-shadow-lg";
                    title.textContent = "GO!";
                    sound.playPop(2.0);
                    desc.innerHTML = "";
                    
                    setTimeout(() => {
                        overlay.classList.add('hidden');
                        game.grid = game.createEmptyGrid();
                        game.score = 0;
                        document.getElementById('score').textContent = "0";
                        document.getElementById('mobile-score').textContent = "0";
                        document.getElementById('chain-count').textContent = "0";
                        
                        game.generateNext();
                        game.spawnPair();
                    }, 800);
                }
            }, 1000);
        }

        // --- KEY & TOUCH BINDINGS (Mobile Optimised Layout) ---
        document.addEventListener('keydown', (e) => {
            if (game.gameState === STATE_GAMEOVER || game.gameState === STATE_WAITING || game.gameState === STATE_COUNTDOWN) return;
            switch(e.code) {
                case 'ArrowLeft': game.move(-1); break;
                case 'ArrowRight': game.move(1); break;
                case 'ArrowUp': case 'KeyX': game.rotate(1); break;
                case 'KeyZ': game.rotate(-1); break;
                case 'ArrowDown': game.isFastDropping = true; break;
                case 'Space': game.hardDrop(); break;
            }
        });
        document.addEventListener('keyup', (e) => { 
            if(e.code === 'ArrowDown') game.isFastDropping = false; 
        });

        // Touch Gamepad binders
        const bindBtn = (id, down, up) => {
            const el = document.getElementById(id);
            if (!el) return;
            const start = (e) => { e.preventDefault(); down(); };
            const end = (e) => { e.preventDefault(); if(up) up(); };
            
            el.addEventListener('touchstart', start); 
            el.addEventListener('mousedown', start);
            el.addEventListener('touchend', end); 
            el.addEventListener('mouseup', end);
            el.addEventListener('mouseleave', end);
        };

        bindBtn('ctrl-left', () => game.move(-1));
        bindBtn('ctrl-right', () => game.move(1));
        bindBtn('ctrl-rot-l', () => game.rotate(-1));
        bindBtn('ctrl-rot-r', () => game.rotate(1));
        bindBtn('ctrl-down', () => { game.isFastDropping = true; }, () => { game.isFastDropping = false; });
        bindBtn('ctrl-hard', () => game.hardDrop());

        // Play Again / Restart Game Handler
        document.getElementById('restart-btn').addEventListener('click', () => {
            document.getElementById('overlay-message').classList.add('hidden');
            if (isSoloMode) {
                startCountdown();
            } else {
                game.quitGame();
            }
        });

        // Core animation Loop
        function loop(timestamp) {
            game.updateAndDraw(timestamp);
            requestAnimationFrame(loop);
        }

        // App Bootup
        window.onload = function() {
            setupFirebase();
            requestAnimationFrame(loop);
        };
    </script>
</body>
</html>
