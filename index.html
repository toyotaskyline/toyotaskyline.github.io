<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puyo Fall - Online Multiplayer</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at center, #1e1b4b 0%, #030712 100%);
            touch-action: manipulation;
            overscroll-behavior: none;
        }
        .retro-font {
            font-family: 'Orbitron', sans-serif;
        }
        ::-webkit-scrollbar { display: none; }
        
        /* エフェクトアニメーション */
        @keyframes neon-pulse {
            0%, 100% { opacity: 0.3; text-shadow: 0 0 10px rgba(168, 85, 247, 0.5); }
            50% { opacity: 0.8; text-shadow: 0 0 20px rgba(168, 85, 247, 0.9); }
        }
        .neon-glow { animation: neon-pulse 2s infinite; }
        
        @keyframes super-burst {
            0% { transform: scale(0) rotate(-20deg); opacity: 0; filter: brightness(2); }
            40% { transform: scale(1.4) rotate(10deg); opacity: 1; filter: brightness(1.5); }
            70% { transform: scale(0.9) rotate(-5deg); filter: brightness(1); }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        .animate-burst {
            animation: super-burst 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        
        .text-rainbow {
            background: linear-gradient(to right, #ff3366, #ff9933, #ffff33, #33ff33, #33ffff, #9933ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: rainbow-shift 3s linear infinite;
            background-size: 200% auto;
        }
        @keyframes rainbow-shift {
            to { background-position: 200% center; }
        }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col items-center justify-between p-2 overflow-hidden select-none">

    <!-- Header -->
    <header class="w-full max-w-2xl text-center py-2 flex justify-between items-center px-4">
        <div>
            <h1 class="text-2xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-purple-400 via-pink-500 to-red-500 retro-font">
                PUYO FALL ONLINE
            </h1>
            <p id="connection-status" class="text-xs text-yellow-300 font-semibold tracking-widest uppercase animate-pulse">Connecting to server...</p>
        </div>
        <button id="sound-toggle" class="bg-gray-800 hover:bg-gray-700 p-2.5 rounded-xl border border-purple-500/30 transition-all text-purple-400">
            <i class="fas fa-volume-up" id="sound-icon"></i>
        </button>
    </header>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col md:flex-row items-center justify-center gap-4 w-full max-w-5xl max-h-[85vh]">
        
        <!-- Left Panel: Next Puyo & Stats -->
        <div class="flex md:flex-col justify-between items-center w-full max-w-md md:w-32 gap-2 px-2 hidden md:flex">
            <div class="bg-gray-950/80 border border-purple-500/20 rounded-2xl p-2 w-full flex flex-col items-center justify-center h-28 backdrop-blur-sm shadow-xl">
                <div class="text-[10px] text-purple-300 font-bold uppercase tracking-wider mb-1">Next</div>
                <canvas id="next-canvas" width="60" height="100" class="w-10 h-16"></canvas>
            </div>
            <div class="bg-gray-950/80 border border-purple-500/20 rounded-2xl p-2 w-full flex flex-col gap-1 backdrop-blur-sm shadow-xl text-center">
                <div class="text-[10px] text-gray-400 font-bold uppercase">Score</div>
                <div id="score" class="text-lg font-bold text-yellow-400 retro-font">0</div>
                <div class="border-t border-gray-800 my-0.5"></div>
                <div class="text-[10px] text-gray-400 font-bold uppercase">Chain</div>
                <div id="chain-count" class="text-lg font-bold text-pink-400 retro-font">0</div>
            </div>
        </div>

        <!-- Center: Game Boards (Player & Opponent side-by-side) -->
        <div class="flex flex-row justify-center items-end gap-2 md:gap-6 w-full max-h-[55vh] md:max-h-none">
            
            <!-- Player Board -->
            <div class="relative flex flex-col items-center">
                <div class="mb-1 flex justify-between w-full px-2">
                    <span class="text-xs font-bold text-blue-300 retro-font">YOU</span>
                    <span id="mobile-score" class="text-xs font-bold text-yellow-400 retro-font md:hidden">0</span>
                </div>
                <div class="relative bg-gray-950/90 border-4 border-blue-500/40 rounded-xl overflow-hidden shadow-2xl shadow-blue-500/20 p-1">
                    <div class="absolute inset-0 bg-[radial-gradient(#1e1b4b_1px,transparent_1px)] [background-size:16px_16px] opacity-20 pointer-events-none"></div>
                    <canvas id="game-canvas" class="block rounded-lg" style="aspect-ratio: 6 / 12; height: min(50vh, 420px);"></canvas>
                    
                    <!-- Chain Banner -->
                    <div id="chain-banner" class="absolute inset-0 pointer-events-none flex flex-col items-center justify-center transform scale-0 opacity-0 transition-all duration-300 z-10">
                        <span id="chain-banner-num" class="text-4xl font-black text-yellow-300 retro-font stroke-black drop-shadow-[0_4px_8px_rgba(0,0,0,0.8)]">1 CHAIN</span>
                        <span id="chain-banner-sub" class="text-sm font-bold text-pink-400 uppercase tracking-widest drop-shadow">Nice!</span>
                    </div>
                </div>
            </div>

            <!-- Opponent Board (Slightly smaller, opacity lowered slightly) -->
            <div id="opponent-container" class="relative flex flex-col items-center opacity-90 transition-opacity duration-500">
                <div class="mb-1 flex justify-between w-full px-2">
                    <span class="text-xs font-bold text-red-300 retro-font">OPPONENT</span>
                    <span id="opponent-score" class="text-xs font-bold text-gray-400 retro-font">0</span>
                </div>
                <div class="relative bg-gray-950/90 border-4 border-red-500/30 rounded-xl overflow-hidden shadow-lg p-1">
                    <div class="absolute inset-0 bg-[radial-gradient(#3f1a1a_1px,transparent_1px)] [background-size:16px_16px] opacity-20 pointer-events-none"></div>
                    <canvas id="opponent-canvas" class="block rounded-lg" style="aspect-ratio: 6 / 12; height: min(40vh, 340px);"></canvas>
                    
                    <!-- Opponent Status Overlay -->
                    <div id="opponent-status" class="absolute inset-0 bg-black/60 flex items-center justify-center backdrop-blur-sm z-10">
                        <span class="text-xs font-bold text-gray-300 uppercase tracking-widest text-center px-2">Waiting<br>for player...</span>
                    </div>
                </div>
            </div>

        </div>

        <!-- Right Panel: Controls -->
        <div class="w-full max-w-md flex flex-col gap-2 px-2 md:w-48 md:justify-center mt-2 md:mt-0">
            <div class="grid grid-cols-5 gap-1.5 w-full">
                <button id="ctrl-left" class="bg-gray-800/80 active:bg-blue-600/90 hover:bg-gray-700/80 border border-gray-700 py-3 rounded-xl flex flex-col items-center justify-center group">
                    <i class="fas fa-arrow-left text-base text-gray-300 group-active:text-white"></i>
                </button>
                <button id="ctrl-rot-l" class="bg-purple-900/40 active:bg-purple-600/90 hover:bg-purple-800/50 border border-purple-500/30 py-3 rounded-xl flex flex-col items-center justify-center group col-span-1">
                    <i class="fas fa-undo text-base text-purple-400 group-active:text-white"></i>
                </button>
                <button id="ctrl-down" class="bg-gray-800/80 active:bg-blue-600/90 hover:bg-gray-700/80 border border-gray-700 py-3 rounded-xl flex flex-col items-center justify-center group">
                    <i class="fas fa-arrow-down text-base text-gray-300 group-active:text-white"></i>
                </button>
                <button id="ctrl-rot-r" class="bg-purple-900/40 active:bg-purple-600/90 hover:bg-purple-800/50 border border-purple-500/30 py-3 rounded-xl flex flex-col items-center justify-center group col-span-1">
                    <i class="fas fa-redo text-base text-purple-400 group-active:text-white"></i>
                </button>
                <button id="ctrl-right" class="bg-gray-800/80 active:bg-blue-600/90 hover:bg-gray-700/80 border border-gray-700 py-3 rounded-xl flex flex-col items-center justify-center group">
                    <i class="fas fa-arrow-right text-base text-gray-300 group-active:text-white"></i>
                </button>
            </div>
            <button id="ctrl-hard" class="w-full bg-gradient-to-r from-indigo-900/60 to-blue-900/60 active:from-indigo-600 active:to-blue-600 border border-indigo-500/30 py-2 rounded-xl font-bold text-xs tracking-wider text-indigo-200 uppercase mt-1">
                Hard Drop
            </button>
        </div>
    </main>

    <!-- Overlay UI for Messages/Countdown -->
    <div id="overlay-message" class="fixed inset-0 flex flex-col items-center justify-center bg-black/85 backdrop-blur-md z-50 transition-all duration-300 hidden">
        <h2 id="overlay-title" class="text-4xl font-black text-white retro-font tracking-wider mb-4 drop-shadow-lg text-center">PLEASE WAIT</h2>
        <p id="overlay-desc" class="text-sm text-gray-300 mb-8 text-center px-6 leading-relaxed">...</p>
        <button id="restart-btn" class="hidden bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 text-white font-extrabold px-8 py-3 rounded-full shadow-lg shadow-purple-500/30 transform hover:scale-105 active:scale-95 transition-all text-sm tracking-widest uppercase">
            PLAY AGAIN
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, updateDoc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- Firebase Configuration (Provided by user) ---
        const firebaseConfig = {
            apiKey: "AIzaSyBkMtffenQmKomClPWZa9fD-WKYrhQpoiw",
            authDomain: "puyopuyo-7ea9c.firebaseapp.com",
            projectId: "puyopuyo-7ea9c",
            storageBucket: "puyopuyo-7ea9c.firebasestorage.app",
            messagingSenderId: "627527369771",
            appId: "1:627527369771:web:8803982027fc39d34d166e",
            measurementId: "G-93ZTVJ7V8D"
        };
        const appNamespace = 'puyo-fall-multiplayer';
        
        let db, auth, userId;
        let matchRef = null;
        let isPlayer1 = true;

        /* --- SOUND SYNTHESIS (Enhanced with Synth Chords) --- */
        class SoundManager {
            constructor() {
                this.ctx = null;
                this.muted = false;
            }
            init() {
                if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            }
            playPop(pitchModifier = 1) {
                if (this.muted) return;
                this.init();
                const now = this.ctx.currentTime;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(220 * pitchModifier, now);
                osc.frequency.exponentialRampToValueAtTime(880 * pitchModifier, now + 0.12);
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start(now);
                osc.stop(now + 0.16);
            }
            playRotate() {
                if (this.muted) return;
                this.init();
                const now = this.ctx.currentTime;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(350, now);
                osc.frequency.linearRampToValueAtTime(450, now + 0.08);
                gain.gain.setValueAtTime(0.08, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.09);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start(now);
                osc.stop(now + 0.1);
            }
            playMove() {
                if (this.muted) return;
                this.init();
                const now = this.ctx.currentTime;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(150, now);
                gain.gain.setValueAtTime(0.05, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start(now);
                osc.stop(now + 0.06);
            }
            playChain(count) {
                if (this.muted) return;
                this.init();
                const now = this.ctx.currentTime;
                
                // より豪華なシンセ和音（アルペジオ風）
                const baseFreqs = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88, 523.25, 587.33, 659.25, 783.99, 880.00, 1046.50];
                const rootIdx = Math.min(count - 1, baseFreqs.length - 1);
                const rootFreq = baseFreqs[rootIdx];
                const thirdFreq = rootFreq * 1.25; // 長3度
                const fifthFreq = rootFreq * 1.5;  // 完全5度
                
                const playSynth = (freq, type, timeStart, timeEnd, vol) => {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, timeStart);
                    gain.gain.setValueAtTime(vol, timeStart);
                    gain.gain.exponentialRampToValueAtTime(0.01, timeEnd);
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    osc.start(timeStart);
                    osc.stop(timeEnd);
                };

                // キラキラ感のある和音を少しずらして鳴らす
                playSynth(rootFreq, 'square', now, now + 0.5, 0.12);
                playSynth(thirdFreq, 'triangle', now + 0.05, now + 0.55, 0.12);
                playSynth(fifthFreq, 'sine', now + 0.1, now + 0.6, 0.12);

                // 大連鎖（3連鎖以上）で低音の響きと迫力を追加
                if (count >= 3) {
                    playSynth(rootFreq / 2, 'sawtooth', now, now + 0.6, 0.15);
                    const subOsc = this.ctx.createOscillator();
                    const subGain = this.ctx.createGain();
                    subOsc.type = 'sine';
                    subOsc.frequency.setValueAtTime(150, now);
                    subOsc.frequency.exponentialRampToValueAtTime(20, now + 0.4);
                    subGain.gain.setValueAtTime(0.4, now);
                    subGain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                    subOsc.connect(subGain);
                    subGain.connect(this.ctx.destination);
                    subOsc.start(now);
                    subOsc.stop(now + 0.4);
                }
            }
            playGameOver() {
                if (this.muted) return;
                this.init();
                const now = this.ctx.currentTime;
                const notes = [300, 240, 180, 120];
                notes.forEach((freq, idx) => {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(freq, now + idx * 0.15);
                    gain.gain.setValueAtTime(0.1, now + idx * 0.15);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + idx * 0.15 + 0.2);
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    osc.start(now + idx * 0.15);
                    osc.stop(now + idx * 0.15 + 0.22);
                });
            }
        }
        const sound = new SoundManager();

        document.getElementById('sound-toggle').addEventListener('click', () => {
            sound.muted = !sound.muted;
            const icon = document.getElementById('sound-icon');
            if (sound.muted) {
                icon.className = 'fas fa-volume-mute text-red-400';
            } else {
                icon.className = 'fas fa-volume-up text-purple-400';
                sound.playPop();
            }
        });

        // --- GAME CONSTANTS ---
        const COLS = 6;
        const ROWS = 12;
        const COLORS = {
            1: { fill: '#ef4444', shadow: '#b91c1c' }, // Red
            2: { fill: '#3b82f6', shadow: '#1d4ed8' }, // Blue
            3: { fill: '#10b981', shadow: '#047857' }, // Green
            4: { fill: '#f59e0b', shadow: '#b45309' }, // Yellow
            5: { fill: '#8b5cf6', shadow: '#6d28d9' }, // Purple
            6: { fill: '#9ca3af', shadow: '#4b5563' }  // Garbage (Gray)
        };

        const STATE_WAITING = 'waiting';
        const STATE_COUNTDOWN = 'countdown';
        const STATE_CONTROL = 'control';
        const STATE_FALLING = 'falling';
        const STATE_POPPING = 'popping';
        const STATE_GAMEOVER = 'gameover';

        class MultiplayerGame {
            constructor() {
                this.canvas = document.getElementById('game-canvas');
                this.ctx = this.canvas.getContext('2d');
                this.nextCanvas = document.getElementById('next-canvas');
                this.nextCtx = this.nextCanvas.getContext('2d');
                
                this.oppCanvas = document.getElementById('opponent-canvas');
                this.oppCtx = this.oppCanvas.getContext('2d');
                
                this.grid = this.createEmptyGrid();
                this.oppGrid = this.createEmptyGrid();
                
                this.activePair = { p1: {x:2, y:0, c:1}, p2: {x:2, y:-1, c:2}, rot: 0 };
                this.nextPair = { c1: 1, c2: 2 };
                
                this.score = 0;
                this.chain = 0;
                this.gameState = STATE_WAITING;
                
                this.dropInterval = 1000;
                this.lastDropTime = 0;
                this.isFastDropping = false;
                
                // Visual effects
                this.particles = [];
                this.popTargets = [];
                this.popTimer = 0;
                this.shakeAmount = 0;
                this.flashAlpha = 0;
                this.eyeLookDir = { x: 0, y: 0 };
                this.lastEyeMove = 0;
                
                this.resizeCanvas();
                window.addEventListener('resize', () => this.resizeCanvas());
            }

            createEmptyGrid() {
                return Array(ROWS).fill(null).map(() => Array(COLS).fill(0));
            }

            resizeCanvas() {
                const height = Math.min(window.innerHeight * 0.5, 420);
                this.canvas.height = height;
                this.canvas.width = height * (COLS / ROWS);
                
                const oppHeight = Math.min(window.innerHeight * 0.4, 340);
                this.oppCanvas.height = oppHeight;
                this.oppCanvas.width = oppHeight * (COLS / ROWS);
            }

            async initMultiplayer() {
                const statusTxt = document.getElementById('connection-status');
                
                try {
                    const app = initializeApp(firebaseConfig);
                    db = getFirestore(app);
                    auth = getAuth(app);
                    
                    await signInAnonymously(auth);
                    // Generate unique ID to allow testing on the same browser in different tabs
                    userId = auth.currentUser.uid + '_' + Math.floor(Math.random()*1000); 
                    
                    statusTxt.textContent = "MATCHMAKING...";
                    statusTxt.className = "text-xs text-blue-300 font-bold uppercase animate-pulse";
                    
                    this.joinLobby();
                } catch (e) {
                    console.error(e);
                    this.showOverlay("CONNECTION ERROR", "Firebaseへの接続に失敗しました。<br>設定を確認してください。", true);
                }
            }

            async joinLobby() {
                const lobbyRef = doc(db, appNamespace, 'LOBBY');
                
                try {
                    const lobbySnap = await getDoc(lobbyRef);
                    if (lobbySnap.exists() && lobbySnap.data().waitingUser && lobbySnap.data().waitingUser !== userId) {
                        // 誰かが待っている -> 参加して対戦開始
                        isPlayer1 = false;
                        const p1Id = lobbySnap.data().waitingUser;
                        matchRef = doc(db, appNamespace, `MATCH_${p1Id}`);
                        
                        await setDoc(matchRef, {
                            p1Id: p1Id, p2Id: userId,
                            p1Grid: JSON.stringify(this.createEmptyGrid()), p2Grid: JSON.stringify(this.createEmptyGrid()),
                            p1Score: 0, p2Score: 0, status: 'playing'
                        });
                        
                        await setDoc(lobbyRef, { waitingUser: null }); // ロビーを空にする
                        this.startCountdown();
                        this.listenToMatch();
                    } else {
                        // 誰もいない -> 自分が待機
                        isPlayer1 = true;
                        matchRef = doc(db, appNamespace, `MATCH_${userId}`);
                        
                        await setDoc(lobbyRef, { waitingUser: userId });
                        await setDoc(matchRef, {
                            p1Id: userId, p2Id: null,
                            p1Grid: JSON.stringify(this.grid), p2Grid: JSON.stringify(this.oppGrid),
                            p1Score: 0, p2Score: 0, status: 'waiting'
                        });
                        
                        this.showOverlay("WAITING...", "対戦相手を探しています<br>URLを友達に送って参加してもらおう！", false);
                        this.listenToMatch();
                    }
                } catch (e) {
                    console.error("Lobby error:", e);
                    this.showOverlay("ERROR", "ロビーへのアクセスに失敗しました。<br>Firestoreのルール設定を確認してください。", true);
                }
            }

            listenToMatch() {
                onSnapshot(matchRef, (docSnap) => {
                    if (!docSnap.exists()) return;
                    const data = docSnap.data();
                    
                    // 相手が参加したらカウントダウン開始
                    if (isPlayer1 && data.p2Id && this.gameState === STATE_WAITING) {
                        this.startCountdown();
                    }

                    // 相手の盤面とスコアを同期
                    if (this.gameState !== STATE_WAITING && this.gameState !== STATE_COUNTDOWN) {
                        try {
                            if (isPlayer1) {
                                this.oppGrid = JSON.parse(data.p2Grid);
                                document.getElementById('opponent-score').textContent = data.p2Score;
                            } else {
                                this.oppGrid = JSON.parse(data.p1Grid);
                                document.getElementById('opponent-score').textContent = data.p1Score;
                            }
                        } catch(e) {}
                        
                        if (data.status === 'gameover_p1' && !isPlayer1) this.endGame(true);
                        if (data.status === 'gameover_p2' && isPlayer1) this.endGame(true);
                    }
                });
            }

            syncState() {
                if (!matchRef || this.gameState === STATE_GAMEOVER) return;
                const updateData = {};
                if (isPlayer1) {
                    updateData.p1Grid = JSON.stringify(this.grid);
                    updateData.p1Score = this.score;
                } else {
                    updateData.p2Grid = JSON.stringify(this.grid);
                    updateData.p2Score = this.score;
                }
                updateDoc(matchRef, updateData).catch(e => console.error(e));
            }

            startCountdown() {
                this.gameState = STATE_COUNTDOWN;
                document.getElementById('connection-status').textContent = "ONLINE MATCH";
                document.getElementById('connection-status').className = "text-xs text-green-400 font-bold uppercase";
                document.getElementById('opponent-status').classList.add('hidden');
                
                const overlay = document.getElementById('overlay-message');
                const title = document.getElementById('overlay-title');
                const desc = document.getElementById('overlay-desc');
                document.getElementById('restart-btn').classList.add('hidden');
                
                overlay.classList.remove('hidden');
                title.className = "text-5xl font-black text-yellow-400 retro-font tracking-wider mb-2 drop-shadow-lg text-center";
                desc.innerHTML = "対戦相手が見つかりました！";
                
                let count = 3;
                const interval = setInterval(() => {
                    if (count > 0) {
                        title.textContent = count;
                        sound.playPop(1.2 + (3 - count) * 0.2);
                        count--;
                    } else {
                        clearInterval(interval);
                        title.className = "text-6xl font-black text-red-500 retro-font tracking-wider mb-2 drop-shadow-lg text-center";
                        title.textContent = "GO!";
                        sound.playPop(2.0);
                        desc.innerHTML = "";
                        
                        setTimeout(() => {
                            overlay.classList.add('hidden');
                            this.grid = this.createEmptyGrid();
                            this.score = 0;
                            this.generateNext();
                            this.spawnPair();
                            this.syncState();
                        }, 800);
                    }
                }, 1000);
            }

            generateNext() {
                const rand = () => Math.floor(Math.random() * 5) + 1;
                this.nextPair = { c1: rand(), c2: rand() };
                this.drawNext();
            }

            spawnPair() {
                if (this.grid[0][2] !== 0 || this.grid[1][2] !== 0) {
                    this.endGame(false);
                    return;
                }
                this.activePair = {
                    p1: { x: 2, y: 0, c: this.nextPair.c1 },
                    p2: { x: 2, y: -1, c: this.nextPair.c2 },
                    rot: 0
                };
                this.generateNext();
                this.gameState = STATE_CONTROL;
                this.lastDropTime = performance.now();
                this.syncState();
            }

            canMoveTo(x1, y1, x2, y2) {
                const check = (x, y) => (y < 0 ? x >= 0 && x < COLS : x >= 0 && x < COLS && y < ROWS && this.grid[y][x] === 0);
                return check(x1, y1) && check(x2, y2);
            }

            move(dx) {
                if (this.gameState !== STATE_CONTROL) return;
                const { p1, p2 } = this.activePair;
                if (this.canMoveTo(p1.x + dx, p1.y, p2.x + dx, p2.y)) {
                    p1.x += dx; p2.x += dx;
                    sound.playMove();
                }
            }

            rotate(dir) {
                if (this.gameState !== STATE_CONTROL) return;
                const nextRot = (this.activePair.rot + dir + 4) % 4;
                const offsets = [ {x:0, y:-1}, {x:1, y:0}, {x:0, y:1}, {x:-1, y:0} ]; // N, E, S, W
                const off = offsets[nextRot];
                
                let tx = this.activePair.p1.x + off.x;
                let ty = this.activePair.p1.y + off.y;
                let nx = this.activePair.p1.x;
                let ny = this.activePair.p1.y;

                // Wall kick
                if (tx < 0) { nx++; tx++; }
                else if (tx >= COLS) { nx--; tx--; }
                if (ty >= ROWS) { ny--; ty--; }

                if (this.canMoveTo(nx, ny, tx, ty)) {
                    this.activePair.p1.x = nx; this.activePair.p1.y = ny;
                    this.activePair.p2.x = tx; this.activePair.p2.y = ty;
                    this.activePair.rot = nextRot;
                    sound.playRotate();
                }
            }

            hardDrop() {
                if (this.gameState !== STATE_CONTROL) return;
                while (this.canMoveTo(this.activePair.p1.x, this.activePair.p1.y + 1, this.activePair.p2.x, this.activePair.p2.y + 1)) {
                    this.activePair.p1.y++; this.activePair.p2.y++;
                    this.score += 2;
                }
                this.lockPair();
            }

            lockPair() {
                const { p1, p2 } = this.activePair;
                if (p1.y >= 0) this.grid[p1.y][p1.x] = p1.c;
                if (p2.y >= 0) this.grid[p2.y][p2.x] = p2.c;
                
                sound.playPop(0.7);
                this.gameState = STATE_FALLING;
                this.chain = 0;
                this.resolveGravity();
            }

            resolveGravity() {
                let moved = false;
                for (let r = ROWS - 2; r >= 0; r--) {
                    for (let c = 0; c < COLS; c++) {
                        if (this.grid[r][c] !== 0 && this.grid[r+1][c] === 0) {
                            let currR = r;
                            while (currR + 1 < ROWS && this.grid[currR+1][c] === 0) {
                                this.grid[currR+1][c] = this.grid[currR][c];
                                this.grid[currR][c] = 0;
                                currR++;
                                moved = true;
                            }
                        }
                    }
                }
                if (moved) {
                    setTimeout(() => this.resolveGravity(), 150);
                } else {
                    this.checkMatches();
                }
            }

            checkMatches() {
                const visited = Array(ROWS).fill(null).map(() => Array(COLS).fill(false));
                const toPop = [];

                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        const color = this.grid[r][c];
                        // 色ブロック(1~5)のみ判定
                        if (color > 0 && color < 6 && !visited[r][c]) {
                            const group = [];
                            const queue = [{r, c}];
                            visited[r][c] = true;

                            while (queue.length > 0) {
                                const curr = queue.shift();
                                group.push(curr);
                                const neighbors = [ {r: curr.r-1, c: curr.c}, {r: curr.r+1, c: curr.c}, {r: curr.r, c: curr.c-1}, {r: curr.r, c: curr.c+1} ];
                                for (const n of neighbors) {
                                    if (n.r >= 0 && n.r < ROWS && n.c >= 0 && n.c < COLS) {
                                        if (!visited[n.r][n.c] && this.grid[n.r][n.c] === color) {
                                            visited[n.r][n.c] = true;
                                            queue.push(n);
                                        }
                                    }
                                }
                            }
                            if (group.length >= 4) toPop.push(...group);
                        }
                    }
                }

                if (toPop.length > 0) {
                    this.chain++;
                    this.popTargets = toPop;
                    this.gameState = STATE_POPPING;
                    this.popTimer = 0;
                    
                    const pts = toPop.length * 10 + Math.pow(this.chain, 2.5) * 8;
                    this.score += Math.floor(pts);
                    document.getElementById('score').textContent = this.score;
                    document.getElementById('mobile-score').textContent = this.score;
                    document.getElementById('chain-count').textContent = this.chain;
                    
                    sound.playChain(this.chain);
                    this.showBanner(this.chain);
                    
                    // シェイク＆フラッシュエフェクト（連鎖数で強化）
                    this.shakeAmount = Math.min(this.chain * 4, 20);
                    this.flashAlpha = Math.min(this.chain * 0.15, 0.8);
                    
                    toPop.forEach(cell => this.createParticles(cell.c, cell.r, this.grid[cell.r][cell.c]));
                    this.syncState();
                } else {
                    this.spawnPair();
                }
            }

            createParticles(gridX, gridY, colorId) {
                const cellW = this.canvas.width / COLS;
                const cellH = this.canvas.height / ROWS;
                const px = gridX * cellW + cellW/2;
                const py = gridY * cellH + cellH/2;
                const fill = COLORS[colorId]?.fill || '#fff';

                // 丸い破片
                for (let i = 0; i < 8; i++) {
                    const a = Math.random() * Math.PI * 2;
                    const s = 3 + Math.random() * 6;
                    this.particles.push({
                        x: px, y: py, vx: Math.cos(a)*s, vy: Math.sin(a)*s,
                        radius: 3 + Math.random()*4, alpha: 1, color: fill, decay: 0.02 + Math.random()*0.02, type: 'circle'
                    });
                }
                // 星形
                const starCount = Math.min(4 + this.chain * 2, 12);
                for (let i = 0; i < starCount; i++) {
                    const a = Math.random() * Math.PI * 2;
                    const s = 4 + Math.random() * 8;
                    this.particles.push({
                        x: px, y: py, vx: Math.cos(a)*s, vy: Math.sin(a)*s,
                        radius: 5 + Math.random()*6, alpha: 1, color: '#ffffff', decay: 0.02 + Math.random()*0.03,
                        type: 'star', rot: Math.random()*Math.PI, rotSpeed: (Math.random()-0.5)*0.4
                    });
                }
            }

            showBanner(chains) {
                const banner = document.getElementById('chain-banner');
                const num = document.getElementById('chain-banner-num');
                const sub = document.getElementById('chain-banner-sub');

                num.textContent = `${chains} CHAIN!`;
                if (chains >= 5) {
                    num.className = "text-5xl font-black retro-font stroke-black drop-shadow-[0_4px_12px_rgba(255,255,255,0.8)] text-rainbow";
                    sub.textContent = "GODLIKE UNLEASHED!!!";
                    sub.className = "text-xl font-black uppercase tracking-widest text-white drop-shadow-[0_0_10px_rgba(255,0,0,1)]";
                } else if (chains >= 3) {
                    num.className = "text-4xl font-black text-red-400 retro-font stroke-black drop-shadow-[0_4px_10px_rgba(255,0,0,0.8)]";
                    sub.textContent = "Awesome Combo!";
                    sub.className = "text-base font-bold text-yellow-300 uppercase tracking-widest drop-shadow";
                } else {
                    num.className = "text-3xl font-black text-yellow-300 retro-font stroke-black drop-shadow-[0_4px_8px_rgba(0,0,0,0.8)]";
                    sub.textContent = chains === 1 ? "Pop!" : "Nice!";
                    sub.className = "text-sm font-bold text-pink-400 uppercase tracking-widest drop-shadow";
                }

                banner.classList.remove('hidden', 'scale-0', 'opacity-0', 'animate-burst');
                void banner.offsetWidth; // force reflow
                banner.classList.add('animate-burst');
                
                if(this.bannerTimer) clearTimeout(this.bannerTimer);
                this.bannerTimer = setTimeout(() => {
                    banner.classList.remove('animate-burst');
                    banner.classList.add('scale-0', 'opacity-0');
                }, 1500);
            }

            endGame(isWinner) {
                this.gameState = STATE_GAMEOVER;
                if (!isWinner && matchRef) {
                    updateDoc(matchRef, { status: isPlayer1 ? 'gameover_p1' : 'gameover_p2' }).catch(()=>{});
                }
                
                sound.playGameOver();
                const title = isWinner ? "YOU WIN!" : "GAME OVER";
                const titleClass = isWinner ? "text-yellow-400" : "text-red-500";
                this.showOverlay(title, `Score: ${this.score}`, true);
                document.getElementById('overlay-title').className = `text-5xl font-black ${titleClass} retro-font tracking-wider mb-4 drop-shadow-lg text-center`;
            }

            showOverlay(titleTxt, descTxt, showBtn) {
                document.getElementById('overlay-message').classList.remove('hidden');
                document.getElementById('overlay-title').textContent = titleTxt;
                document.getElementById('overlay-desc').innerHTML = descTxt;
                if(showBtn) document.getElementById('restart-btn').classList.remove('hidden');
                else document.getElementById('restart-btn').classList.add('hidden');
            }

            updateAndDraw(now) {
                if (now - this.lastEyeMove > 1800) {
                    this.eyeLookDir = { x: (Math.random()-0.5)*5, y: (Math.random()-0.5)*5 };
                    this.lastEyeMove = now;
                }

                // Game Logic Update
                if (this.gameState === STATE_CONTROL) {
                    const activeInterval = this.isFastDropping ? 60 : this.dropInterval;
                    if (now - this.lastDropTime >= activeInterval) {
                        if (this.canMoveTo(this.activePair.p1.x, this.activePair.p1.y+1, this.activePair.p2.x, this.activePair.p2.y+1)) {
                            this.activePair.p1.y++; this.activePair.p2.y++;
                        } else {
                            this.lockPair();
                        }
                        this.lastDropTime = now;
                    }
                } else if (this.gameState === STATE_POPPING) {
                    this.popTimer += 0.05;
                    if (this.popTimer >= 1.0) {
                        this.popTargets.forEach(cell => this.grid[cell.r][cell.c] = 0);
                        this.popTargets = [];
                        this.gameState = STATE_FALLING;
                        this.resolveGravity();
                    }
                }

                // Particle Update
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    let p = this.particles[i];
                    p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.alpha -= p.decay;
                    if (p.alpha <= 0) this.particles.splice(i, 1);
                }

                // --- RENDERING ---
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                
                this.ctx.save();
                // 画面シェイク
                if (this.shakeAmount > 0) {
                    this.ctx.translate((Math.random()-0.5)*this.shakeAmount, (Math.random()-0.5)*this.shakeAmount);
                    this.shakeAmount *= 0.85;
                    if(this.shakeAmount < 0.5) this.shakeAmount = 0;
                }

                this.drawGrid(this.ctx, this.canvas, this.grid, this.popTargets, this.popTimer);
                if (this.gameState === STATE_CONTROL) this.drawActive(this.ctx, this.canvas);
                this.drawParticles(this.ctx);
                this.ctx.restore();

                // フラッシュ
                if (this.flashAlpha > 0) {
                    this.ctx.fillStyle = `rgba(255, 255, 255, ${this.flashAlpha})`;
                    this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                    this.flashAlpha -= 0.05;
                }

                // Opponent rendering
                this.oppCtx.clearRect(0, 0, this.oppCanvas.width, this.oppCanvas.height);
                this.drawGrid(this.oppCtx, this.oppCanvas, this.oppGrid, [], 0, true);
            }

            drawGrid(ctx, cvs, gridData, popList, pTimer, isOpponent = false) {
                const cW = cvs.width / COLS;
                const cH = cvs.height / ROWS;
                const radius = Math.min(cW, cH) * 0.46;

                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        const colId = gridData[r][c];
                        if (colId !== 0) {
                            const isPopping = popList.some(p => p.r === r && p.c === c);
                            const cx = c * cW + cW/2;
                            const cy = r * cH + cH/2;
                            
                            if (isPopping) {
                                ctx.save();
                                ctx.globalAlpha = 1 - pTimer;
                                this.drawNode(ctx, cx, cy, radius * (1 + pTimer*0.5), colId, false, isOpponent);
                                ctx.restore();
                            } else {
                                // Connections
                                const colorConf = COLORS[colId];
                                if (colorConf && colId !== 6) { // Garbage doesn't connect
                                    const check = (dr, dc) => (r+dr>=0 && r+dr<ROWS && c+dc>=0 && c+dc<COLS && gridData[r+dr][c+dc] === colId);
                                    ctx.fillStyle = colorConf.fill;
                                    ctx.beginPath();
                                    const bw = radius * 0.8;
                                    if (check(-1, 0)) ctx.fillRect(cx - bw/2, cy - cH/2, bw, cH/2); // N
                                    if (check(1, 0)) ctx.fillRect(cx - bw/2, cy, bw, cH/2); // S
                                    if (check(0, 1)) ctx.fillRect(cx, cy - bw/2, cW/2, bw); // E
                                    if (check(0, -1)) ctx.fillRect(cx - cW/2, cy - bw/2, cW/2, bw); // W
                                }
                                this.drawNode(ctx, cx, cy, radius, colId, false, isOpponent);
                            }
                        }
                    }
                }
            }

            drawActive(ctx, cvs) {
                const cW = cvs.width / COLS;
                const cH = cvs.height / ROWS;
                const radius = Math.min(cW, cH) * 0.46;
                
                // Ghost
                let dy1 = this.activePair.p1.y, dy2 = this.activePair.p2.y;
                while (this.canMoveTo(this.activePair.p1.x, dy1+1, this.activePair.p2.x, dy2+1)) { dy1++; dy2++; }
                
                ctx.save();
                ctx.globalAlpha = 0.25;
                ctx.lineWidth = 2;
                ctx.setLineDash([3, 3]);
                const drawG = (x, y, c) => {
                    if(y >= 0) {
                        ctx.strokeStyle = COLORS[c].fill;
                        ctx.beginPath(); ctx.arc(x*cW+cW/2, y*cH+cH/2, radius-2, 0, Math.PI*2); ctx.stroke();
                    }
                };
                drawG(this.activePair.p1.x, dy1, this.activePair.p1.c);
                drawG(this.activePair.p2.x, dy2, this.activePair.p2.c);
                ctx.restore();

                // Active
                const drawA = (p) => {
                    if(p.y >= 0) this.drawNode(ctx, p.x*cW+cW/2, p.y*cH+cH/2, radius, p.c, true);
                };
                drawA(this.activePair.p1); drawA(this.activePair.p2);
            }

            drawNode(ctx, cx, cy, radius, colId, isActive, isOpponent = false) {
                const conf = COLORS[colId];
                if (!conf) return;
                ctx.save();
                ctx.translate(cx, cy);
                
                let scale = 1;
                if (!isActive && !isOpponent) scale = 1 + Math.sin(performance.now()*0.003 + cx*cy)*0.02;
                ctx.scale(scale, scale);

                ctx.beginPath();
                ctx.arc(0, 0, radius, 0, Math.PI*2);
                
                const grad = ctx.createRadialGradient(-radius*0.3, -radius*0.3, radius*0.1, 0, 0, radius);
                grad.addColorStop(0, '#fff');
                grad.addColorStop(0.2, conf.fill);
                grad.addColorStop(1, conf.shadow);
                ctx.fillStyle = grad;
                ctx.fill();
                
                ctx.strokeStyle = 'rgba(0,0,0,0.2)';
                ctx.lineWidth = 1.5;
                ctx.stroke();

                // Eyes (skip for garbage)
                if (colId !== 6) {
                    const eOff = radius * 0.35, eRad = radius * 0.22, pRad = radius * 0.11;
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(-eOff, -radius*0.1, eRad, 0, Math.PI*2);
                    ctx.arc(eOff, -radius*0.1, eRad, 0, Math.PI*2);
                    ctx.fill();
                    
                    const lx = isOpponent ? 0 : this.eyeLookDir.x * 0.3;
                    const ly = isOpponent ? 0 : this.eyeLookDir.y * 0.3;
                    
                    ctx.fillStyle = '#0f172a';
                    ctx.beginPath();
                    ctx.arc(-eOff+lx, -radius*0.1+ly, pRad, 0, Math.PI*2);
                    ctx.arc(eOff+lx, -radius*0.1+ly, pRad, 0, Math.PI*2);
                    ctx.fill();
                    
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(-eOff+lx-1, -radius*0.1+ly-1, 1.5, 0, Math.PI*2);
                    ctx.arc(eOff+lx-1, -radius*0.1+ly-1, 1.5, 0, Math.PI*2);
                    ctx.fill();
                }
                ctx.restore();
            }

            drawParticles(ctx) {
                this.particles.forEach(p => {
                    ctx.save();
                    ctx.globalAlpha = p.alpha;
                    ctx.fillStyle = p.color;
                    if (p.type === 'star') {
                        ctx.translate(p.x, p.y); ctx.rotate(p.rot); p.rot += p.rotSpeed;
                        ctx.beginPath();
                        for (let i = 0; i < 8; i++) {
                            const rad = i%2===0 ? p.radius : p.radius*0.3;
                            const a = (i*Math.PI)/4;
                            if(i===0) ctx.moveTo(Math.cos(a)*rad, Math.sin(a)*rad);
                            else ctx.lineTo(Math.cos(a)*rad, Math.sin(a)*rad);
                        }
                        ctx.fill();
                    } else {
                        ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2); ctx.fill();
                    }
                    ctx.restore();
                });
            }

            drawNext() {
                this.nextCtx.clearRect(0, 0, this.nextCanvas.width, this.nextCanvas.height);
                const w = this.nextCanvas.width, h = this.nextCanvas.height, r = Math.min(w,h)*0.2;
                this.drawNode(this.nextCtx, w/2, h*0.3, r, this.nextPair.c2, false, true);
                this.drawNode(this.nextCtx, w/2, h*0.7, r, this.nextPair.c1, false, true);
            }
        }

        let game;
        window.onload = function() {
            game = new MultiplayerGame();
            game.initMultiplayer();

            document.addEventListener('keydown', (e) => {
                if (game.gameState === STATE_GAMEOVER || game.gameState === STATE_WAITING || game.gameState === STATE_COUNTDOWN) return;
                switch(e.code) {
                    case 'ArrowLeft': game.move(-1); break;
                    case 'ArrowRight': game.move(1); break;
                    case 'ArrowUp': case 'KeyX': game.rotate(1); break;
                    case 'KeyZ': game.rotate(-1); break;
                    case 'ArrowDown': game.isFastDropping = true; break;
                    case 'Space': game.hardDrop(); break;
                }
            });
            document.addEventListener('keyup', (e) => { if(e.code === 'ArrowDown') game.isFastDropping = false; });

            const bindBtn = (id, down, up) => {
                const el = document.getElementById(id);
                const start = (e) => { e.preventDefault(); down(); };
                const end = (e) => { e.preventDefault(); if(up) up(); };
                el.addEventListener('touchstart', start); el.addEventListener('mousedown', start);
                el.addEventListener('touchend', end); el.addEventListener('mouseup', end);
                el.addEventListener('mouseleave', end);
            };

            bindBtn('ctrl-left', () => game.move(-1));
            bindBtn('ctrl-right', () => game.move(1));
            bindBtn('ctrl-rot-l', () => game.rotate(-1));
            bindBtn('ctrl-rot-r', () => game.rotate(1));
            bindBtn('ctrl-down', () => { game.isFastDropping = true; }, () => { game.isFastDropping = false; });
            bindBtn('ctrl-hard', () => game.hardDrop());

            document.getElementById('restart-btn').addEventListener('click', () => {
                document.getElementById('overlay-message').classList.add('hidden');
                game.initMultiplayer(); // Re-queue
            });

            function loop(timestamp) {
                game.updateAndDraw(timestamp);
                requestAnimationFrame(loop);
            }
            requestAnimationFrame(loop);
        };
    </script>
</body>
</html>
